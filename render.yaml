services:
  - type: web
    name: polymarket-bot
    runtime: docker
    repo: https://github.com/easypcinformatique-svg/Dev
    branch: claude/pokymarket-work-MXwve
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 5050
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GITHUB_TOKEN
        sync: false  # A configurer manuellement dans Render

  - type: web
    name: immo-sniper-dashboard
    runtime: docker
    repo: https://github.com/easypcinformatique-svg/Dev
    branch: master
    plan: free
    dockerfilePath: ./immo-sniper-dashboard/Dockerfile
    rootDir: immo-sniper-dashboard
    envVars:
      - key: PORT
        value: 5051
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SCAN_INTERVAL
        value: "45"
