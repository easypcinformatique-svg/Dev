name: Deploy Chantier Tracker

on:
  push:
    branches: [master, claude/construction-management-tool-a1trH]
    paths:
      - 'chantier-tracker/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build
        working-directory: chantier-tracker
        run: |
          npm ci
          npx vite build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: chantier-tracker/dist

      - id: deployment
        uses: actions/deploy-pages@v4
