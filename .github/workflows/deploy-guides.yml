name: Auto-deploy livraison site to all repos

on:
  push:
    branches: [master]
    paths:
      - 'pizzeria/livraison-site/**'

jobs:
  # Job 1 : Deploy blog guides to satellite city repos
  deploy-blog:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - livraison-pizza-monteux
          - livraison-pizza-serres
          - livraison-pizza-pernes-les-fontaines
          - livraison-pizza-aubignan
          - livraison-pizza-loriol-du-comtat

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Deploy blog to satellite repo
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/${{ matrix.repo }}.git satellite
          cd satellite
          mkdir -p blog
          cp ../pizzeria/livraison-site/blog/blog.css blog/
          cp ../pizzeria/livraison-site/blog/guide-*.html blog/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes for ${{ matrix.repo }}"
          else
            git commit -m "Auto-deploy: update blog guides"
            git push origin main
            echo "Deployed to ${{ matrix.repo }}"
          fi

  # Job 2 : Deploy entire livraison site to main Carpentras repo
  deploy-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Deploy to livraison-pizza-carpentras
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/livraison-pizza-carpentras.git satellite
          cd satellite

          # Copy all site files (except .git)
          rsync -av --delete --exclude='.git' ../pizzeria/livraison-site/ ./

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes for livraison-pizza-carpentras"
          else
            git commit -m "Auto-deploy: update livraison site"
            git push origin main
            echo "Deployed to livraison-pizza-carpentras"
          fi
