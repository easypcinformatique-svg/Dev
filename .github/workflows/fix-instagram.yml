name: Fix Instagram URL

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-instagram.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fix Instagram URL
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          sed -i 's|instagram.com/pizzanapolicarpentras/|instagram.com/pizza_napoli_carpentras/|g' index.html
          echo "Fixed Instagram URL"

          git add index.html
          git commit -m "Fix Instagram URL: pizza_napoli_carpentras"
          git push origin main
