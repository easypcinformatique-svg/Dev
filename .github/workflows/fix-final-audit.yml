name: Fix engagements accents + review count sync

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-final-audit.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and fix
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Rewrite nos-engagements with proper accents
          python3 -c "
          with open('nos-engagements/index.html','r',encoding='utf-8') as f: c=f.read()

          # Meta tags
          c=c.replace('engagements qualite','engagements qualité')
          c=c.replace('ingredients frais, pate maison','ingrédients frais, pâte maison')
          c=c.replace('Decouvrez nos engagements qualite','Découvrez nos engagements qualité')
          c=c.replace('ingredients frais, pate maison, livraison rapide','ingrédients frais, pâte maison, livraison rapide')

          # Page title
          c=c.replace('Nos Engagements Qualite','Nos Engagements Qualité')
          c=c.replace('Ce qui fait la difference','Ce qui fait la différence')

          # Body content - fix all missing accents
          replacements = {
              'Ingredients Frais': 'Ingrédients Frais',
              'selectionnons': 'sélectionnons',
              'ingredients': 'ingrédients',
              'legumes': 'légumes',
              'congele': 'congelé',
              'genereuse': 'généreuse',
              'Pate Maison': 'Pâte Maison',
              'pate est preparee': 'pâte est préparée',
              'genereux': 'généreux',
              'resultat': 'résultat',
              'savoir-faire': 'savoir-faire',
              'Livraison Rapide et Gratuite': 'Livraison Rapide et Gratuite',
              'genereuse,': 'généreuse,',
              'Proximite et Service': 'Proximité et Service',
              'l ecoute': \"l'écoute\",
              'preferences': 'préférences',
              'c est': \"c'est\",
              'C est': \"C'est\",
              'n est': \"n'est\",
              'd une': \"d'une\",
              'fierte': 'fierté',
              'Engagement Local': 'Engagement Local',
              'societe': 'société',
              'demarche': 'démarche',
              'genereuses a partir': 'généreuses à partir',
              'supplements caches': 'suppléments cachés',
              'Decouvrez': 'Découvrez',
              'qualite :': 'qualité :',
              'selectionnees': 'sélectionnées',
              'aupres de': 'auprès de',
              'preparee chaque': 'préparée chaque',
              'genereux,': 'généreux,',
              'allergies,': 'allergies,',
              'probleme': 'problème',
              'cotes': 'côtés',
              'Carpentras depuis': 'Carpentras depuis',
              'a travers': 'à travers',
              'Prix Justes': 'Prix Justes',
              'Envie d une pizza': \"Envie d'une pizza\",
          }
          for old, new in replacements.items():
              c = c.replace(old, new)

          with open('nos-engagements/index.html','w',encoding='utf-8') as f: f.write(c)
          print('Fixed accents on nos-engagements')
          "

          # 2. Sync review count: get Schema values and update visible text
          python3 -c "
          import re
          with open('index.html','r',encoding='utf-8') as f: c=f.read()

          # Find the Schema.org reviewCount and ratingValue
          rc_match = re.search(r'\"reviewCount\":\"(\d+)\"', c)
          rv_match = re.search(r'\"ratingValue\":\"([\d.]+)\"', c)

          if rc_match and rv_match:
              rc = rc_match.group(1)
              rv = rv_match.group(1)
              print(f'Schema says: {rv}/5, {rc} avis')

              # Update all visible text to match Schema
              c = re.sub(r'\d+ avis Google', f'{rc} avis Google', c)
              c = re.sub(r'\d+ avis clients', f'{rc} avis clients', c)
              c = re.sub(r'\d+ avis client', f'{rc} avis client', c)
              c = re.sub(r'data-target=\"\d+\"(>0</span><span class=\"counter-lbl\">Avis)', f'data-target=\"{rc}\"\\1', c)
              c = re.sub(r'4[,.]2/5', f'{rv}/5', c)

              with open('index.html','w',encoding='utf-8') as f: f.write(c)
              print(f'Synced visible text to {rv}/5, {rc} avis')
          "

          git add -A
          git commit -m "Fix nos-engagements accents + sync review count with Schema.org"
          git push origin main
          echo "Done!"
