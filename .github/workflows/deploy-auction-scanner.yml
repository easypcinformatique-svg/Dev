name: Deploy Auction Scanner 13

on:
  push:
    branches: [master]
    paths:
      - 'auction-scanner-13/**'
  schedule:
    # Mise a jour des encheres toutes les 6 heures
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auction-scanner-13

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: auction-scanner-13/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: |
          python -m py_compile app.py
          python -m py_compile generate_static.py
          python -m py_compile scrapers/base_scraper.py
          python -m py_compile scrapers/interencheres.py
          python -m py_compile scrapers/encheres_publiques.py
          python -m py_compile scrapers/agorastore.py

      - name: Test scrapers
        run: |
          python -c "
          from scrapers.interencheres import InterencheresScraper
          from scrapers.encheres_publiques import EncheresPubliquesScraper
          from scrapers.agorastore import AgorastoreScraper

          for S in [InterencheresScraper, EncheresPubliquesScraper, AgorastoreScraper]:
              s = S()
              r = s.scan(department='13')
              assert len(r) > 0, f'{s.name}: aucun resultat'
              for a in r:
                  assert 'id' in a and 'title' in a and 'category' in a
              print(f'{s.name}: {len(r)} encheres OK')
          print('All scrapers OK!')
          "

  build-and-deploy:
    name: Build & Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: auction-scanner-13/requirements.txt

      - name: Install dependencies
        run: pip install -r auction-scanner-13/requirements.txt

      - name: Generate auction data
        run: cd auction-scanner-13 && python generate_static.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./auction-scanner-13/docs
          destination_dir: auction-scanner-13
          keep_files: false
          commit_message: "Update encheres data - ${{ github.sha }}"

      - name: Deploy summary
        run: |
          echo "## Auction Scanner 13 - Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Pages | Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://easypcinformatique-svg.github.io/Dev/auction-scanner-13/ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Donnees mises a jour automatiquement toutes les 6h." >> $GITHUB_STEP_SUMMARY
