name: Update site version date

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Restore pizzeria site from backup"]
    types: [completed]

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Update version in production site
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          export VERSION_DATE=$(TZ='Europe/Paris' date '+%d/%m/%Y')
          export VERSION_TIME=$(TZ='Europe/Paris' date '+%Hh%M')

          echo "New version: v. ${VERSION_DATE} - ${VERSION_TIME}"

          python3 << 'PYEOF'
          import re, os
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()
          vdate = os.environ['VERSION_DATE']
          vtime = os.environ['VERSION_TIME']
          pattern = r'v\.\s*\d{2}/\d{2}/\d{4}\s*&middot;\s*\d{2}h\d{2}'
          replacement = f'v. {vdate} &middot; {vtime}'
          new_content, count = re.subn(pattern, replacement, content, count=1)
          if count > 0:
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(new_content)
              print(f'Version updated to: v. {vdate} - {vtime}')
          else:
              print('No version pattern found')
          PYEOF

          if git diff --quiet; then
            echo "No changes"
          else
            git add index.html
            git commit -m "Update version: ${VERSION_DATE} ${VERSION_TIME}"
            git push origin main
            echo "Pushed!"
          fi
