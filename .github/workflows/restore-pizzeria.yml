name: Restore original pizzeria site

on:
  workflow_dispatch:

jobs:
  restore-site:
    runs-on: ubuntu-latest
    steps:
      - name: Restore original site
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git satellite
          cd satellite
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Find the commit before auto-deploy and reset to it
          TARGET=$(git log --oneline --all | grep "Fix gallery: Saint-Jacques" | head -1 | cut -d' ' -f1)
          echo "Restoring to commit: $TARGET"

          if [ -z "$TARGET" ]; then
            echo "ERROR: Could not find target commit"
            exit 1
          fi

          git reset --hard $TARGET
          git push --force origin main
          echo "Successfully restored original site to $TARGET"
