name: Fix 21h45 slot + add Monteux to zone table

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-slots-monteux.yml'
      - '.github/scripts/fix_slots_monteux.py'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone and fix
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd ..
          python3 .github/scripts/fix_slots_monteux.py site/index.html
          cd site
          git add index.html
          git diff --cached --stat
          git commit -m "Remove 21h45 slot + add Monteux 3 pizzas to zone table" || echo "No changes"
          git push origin main
