name: Fix menu errors + WebP images + GA4

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-menu-webp-ga4.yml'

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Clone production site
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install WebP converter
        run: sudo apt-get install -y webp

      - name: Convert images to WebP
        run: |
          cd site
          for img in *.jpg *.png; do
            [ -f "$img" ] || continue
            name="${img%.*}"
            ext="${img##*.}"
            # Convert to WebP with quality 80
            cwebp -q 80 "$img" -o "${name}.webp" 2>/dev/null && echo "Converted: $img -> ${name}.webp" || echo "Skip: $img"
          done

          # Show size comparison
          echo ""
          echo "=== Size comparison ==="
          for img in hero1 hero2 hero3 hero4 hero5 Tartufo saint-jacques-; do
            if [ -f "${img}.jpg" ] && [ -f "${img}.webp" ]; then
              OLD=$(stat -f%z "${img}.jpg" 2>/dev/null || stat -c%s "${img}.jpg" 2>/dev/null)
              NEW=$(stat -f%z "${img}.webp" 2>/dev/null || stat -c%s "${img}.webp" 2>/dev/null)
              echo "${img}: ${OLD}B -> ${NEW}B ($(( (OLD - NEW) * 100 / OLD ))% saved)"
            fi
          done

      - name: Fix menu + Since + GA4 + WebP references
        run: |
          cd site
          python3 << 'ENDFIX'
          import re

          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          changes = []

          # 1. Fix "Since 2008" -> "Depuis 2008" (but keep the loader one that says "— Since 2008 —")
          # Only change the H1 and footer ones
          content = content.replace(
              'Pizza Napoli Carpentras . Since 2008',
              'Pizza Napoli Carpentras . Depuis 2008'
          )
          content = content.replace(
              '>Since 2008<',
              '>Depuis 2008<'
          )
          changes.append('Fixed Since -> Depuis 2008')

          # 2. Fix Bergere / Dame Blanche duplicate description
          # Find Dame Blanche and change its description
          # The menu is in JS arrays, format: ['Name','Description',prixP,prixG,'category']
          if "Dame Blanche','Fromage, cr" in content:
              content = content.replace(
                  "Dame Blanche','Fromage, cr\u00e8me, ch\u00e8vre, mozzarella'",
                  "Dame Blanche','Fromage, cr\u00e8me fra\u00eeche, mozzarella, emmental'"
              )
              changes.append('Fixed Dame Blanche description')
          elif "Dame Blanche" in content:
              # Try alternative format
              old = "Dame Blanche','Fromage, creme, chevre, mozzarella'"
              new = "Dame Blanche','Fromage, creme fraiche, mozzarella, emmental'"
              if old in content:
                  content = content.replace(old, new)
                  changes.append('Fixed Dame Blanche description (alt)')

          # 3. Add Google Analytics 4
          if 'gtag' not in content and 'G-' not in content:
              ga4_script = """
          <!-- Google Analytics 4 -->
          <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
          <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XXXXXXXXXX');</script>"""
              content = content.replace('</head>', ga4_script + '\n</head>', 1)
              changes.append('Added GA4 placeholder (replace G-XXXXXXXXXX with real ID)')

          # 4. Update img src to use WebP with fallback
          # Replace src="xxx.jpg" with a picture element approach
          # Since this is inline HTML, we use srcset for WebP support
          def add_webp_srcset(match):
              tag = match.group(0)
              src_match = re.search(r'src="([^"]*\.(jpg|png))"', tag)
              if not src_match:
                  return tag
              src = src_match.group(1)
              name = src.rsplit('.', 1)[0]
              webp_src = name + '.webp'
              if 'srcset=' in tag:
                  return tag
              # Add srcset with webp
              tag = tag.replace(
                  f'src="{src}"',
                  f'src="{src}" srcset="{webp_src}" type="image/webp"'
              )
              return tag

          content = re.sub(r'<img\s[^>]+>', add_webp_srcset, content)
          changes.append('Added WebP srcset to images')

          # 5. Update CSS background-image for hero to include WebP
          # hero images are in CSS: background-image:url(heroX.jpg)
          for i in range(1, 6):
              old_bg = f"url(hero{i}.jpg)"
              new_bg = f"url(hero{i}.webp)"
              if old_bg in content:
                  content = content.replace(old_bg, new_bg)
          changes.append('Updated hero background images to WebP')

          print(f'Changes: {len(changes)}')
          for c in changes:
              print(f'  - {c}')

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          ENDFIX

      - name: Commit and push
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          cd site
          git add -A
          git diff --cached --stat
          git commit -m "Fix menu errors + WebP images + GA4 + Depuis 2008" || echo "No changes"
          git push origin main
          echo "All fixes deployed!"
