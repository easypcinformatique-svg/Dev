name: Fix WebP references and remaining Since 2008

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-webp-refs.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Fix references
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fix hero CSS backgrounds: url('heroX.jpg') -> url('heroX.webp')
          sed -i "s|url('hero1.jpg')|url('hero1.webp')|g" index.html
          sed -i "s|url('hero2.jpg')|url('hero2.webp')|g" index.html
          sed -i "s|url('hero3.jpg')|url('hero3.webp')|g" index.html
          sed -i "s|url('hero4.jpg')|url('hero4.webp')|g" index.html
          sed -i "s|url('hero5.jpg')|url('hero5.webp')|g" index.html
          echo "Fixed hero backgrounds to WebP"

          # Fix remaining "Since 2008" -> "Depuis 2008"
          sed -i 's/Since 2008/Depuis 2008/g' index.html
          echo "Fixed all Since -> Depuis 2008"

          # Fix img src to webp
          sed -i 's/src="Tartufo\.jpg"/src="Tartufo.webp"/g' index.html
          sed -i 's/src="saint-jacques-\.jpg"/src="saint-jacques-.webp"/g' index.html
          sed -i 's/src="20230926_202527\.jpg"/src="20230926_202527.webp"/g' index.html
          sed -i 's/src="20230926_203901\.jpg"/src="20230926_203901.webp"/g' index.html
          sed -i 's/src="20240123_201507\.jpg"/src="20240123_201507.webp"/g' index.html
          sed -i 's/src="20250425_192921\.jpg"/src="20250425_192921.webp"/g' index.html
          echo "Fixed img src to WebP"

          git add index.html
          git commit -m "Fix WebP references in CSS backgrounds and img tags + Depuis 2008"
          git push origin main
          echo "Done!"
