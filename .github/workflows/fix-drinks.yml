name: Remove drinks except Fanta Coca Ice Tea

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-drinks.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Python script
        run: cp .github/scripts/fix_drinks.py /tmp/fix_drinks.py 2>/dev/null || echo "Using inline"

      - name: Clone and fix
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          python3 << 'EOF'
          import re
          with open("index.html", "r", encoding="utf-8") as f:
              c = f.read()
          keep = ["Coca-Cola", "Fanta", "Ice Tea"]
          pattern = r"\{name:'([^']*)',price:[0-9.]+\}"
          for m in re.finditer(pattern, c):
              full = m.group(0)
              name = m.group(1)
              if not any(k.lower() in name.lower() for k in keep):
                  c = c.replace(full + ",", "")
                  c = c.replace("," + full, "")
                  c = c.replace(full, "")
                  print("Removed: " + name)
              else:
                  print("Kept: " + name)
          while ",," in c:
              c = c.replace(",,", ",")
          c = c.replace(",]", "]")
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(c)
          EOF

          git add index.html
          git commit -m "Remove drinks: keep only Coca-Cola, Fanta, Ice Tea"
          git push origin main
