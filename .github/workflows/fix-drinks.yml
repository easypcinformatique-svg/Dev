name: Remove drinks except Fanta Coca Ice Tea

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-drinks.yml'
      - '.github/scripts/fix_drinks.py'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone and fix
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd ..
          python3 .github/scripts/fix_drinks.py site/index.html
          cd site
          git add index.html
          git commit -m "Remove drinks: keep only Coca-Cola, Fanta, Ice Tea"
          git push origin main
