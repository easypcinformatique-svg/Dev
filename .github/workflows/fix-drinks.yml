name: Remove drinks except Fanta Coca Ice Tea

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-drinks.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and fix
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          python3 -c "
          import re
          with open('index.html','r',encoding='utf-8') as f: c=f.read()
          keep = ['Coca-Cola','Fanta','Ice Tea']
          drinks = re.findall(r\"\{name:'[^']*',price:[0-9.]+\}\", c)
          for d in drinks:
              name = re.search(r\"name:'([^']*)\", d).group(1)
              if not any(k.lower() in name.lower() for k in keep):
                  c = c.replace(d+',','')
                  c = c.replace(','+d,'')
                  c = c.replace(d,'')
                  print(f'Removed: {name}')
              else:
                  print(f'Kept: {name}')
          while ',,' in c: c=c.replace(',,',',')
          c=c.replace(',]',']')
          with open('index.html','w',encoding='utf-8') as f: f.write(c)
          "

          git add index.html
          git commit -m "Remove drinks: keep only Coca-Cola, Fanta, Ice Tea"
          git push origin main
