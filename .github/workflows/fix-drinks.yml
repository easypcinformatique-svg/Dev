name: Remove drinks except Fanta Coca Ice Tea

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-drinks.yml'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Clone and fix
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          sed -i "s/{name:'Sprite 33cl',price:2.50},//g" index.html
          sed -i "s/{name:'Orangina 33cl',price:2.50},//g" index.html
          sed -i "s/{name:'Jus de fruits 33cl',price:2.50},//g" index.html
          sed -i "s/{name:'Eau min.*50cl',price:1.50},//g" index.html
          sed -i "s/{name:'Eau min.*1.5L',price:2.50},//g" index.html
          sed -i "s/{name:'Bi.*re 33cl',price:3.00}//g" index.html

          echo "Removed Sprite, Orangina, Jus, Eau, Biere"

          git add index.html
          git commit -m "Remove drinks: keep only Coca-Cola, Fanta, Ice Tea"
          git push origin main
