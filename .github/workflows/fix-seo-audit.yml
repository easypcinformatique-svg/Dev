name: Fix critical SEO and accessibility issues

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/fix-seo-audit.yml'

jobs:
  fix-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Clone production site
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create fix script
        run: |
          cat > /tmp/fix.py << 'ENDSCRIPT'
          import re

          with open('site/index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          changes = []

          # 1. Add lang="fr" to <html>
          if 'lang="fr"' not in content:
              content = content.replace('<html', '<html lang="fr"', 1)
              changes.append('Added lang=fr')

          # 2. Add meta description
          if '<meta name="description"' not in content:
              content = content.replace(
                  '</title>',
                  '</title>\n<meta name="description" content="Pizza Napoli Carpentras - Pizzeria artisanale depuis 2008. Plus de 80 pizzas genereuses des 7,90 EUR. Livraison gratuite a domicile 7j/7 des 17h30. Tel 07 61 08 36 08.">',
                  1
              )
              changes.append('Added meta description')

          # 3. Add canonical URL
          if 'rel="canonical"' not in content:
              content = content.replace(
                  '</title>',
                  '</title>\n<link rel="canonical" href="https://pizzanapolicarpentras.fr/">',
                  1
              )
              changes.append('Added canonical URL')

          # 4. Add Open Graph tags
          if 'og:title' not in content:
              og = (
                  '\n<meta property="og:type" content="restaurant">'
                  '\n<meta property="og:title" content="Pizza Napoli Carpentras | Pizzeria Livraison a Domicile">'
                  '\n<meta property="og:description" content="Pizzeria artisanale depuis 2008. 80+ pizzas. Livraison gratuite 7j/7. Tel 07 61 08 36 08.">'
                  '\n<meta property="og:url" content="https://pizzanapolicarpentras.fr/">'
                  '\n<meta property="og:image" content="https://pizzanapolicarpentras.fr/hero1.jpg">'
                  '\n<meta property="og:locale" content="fr_FR">'
                  '\n<meta property="og:site_name" content="Pizza Napoli Carpentras">'
              )
              content = content.replace('</title>', '</title>' + og, 1)
              changes.append('Added Open Graph tags')

          # 5. Add Twitter Cards
          if 'twitter:card' not in content:
              tw = (
                  '\n<meta name="twitter:card" content="summary_large_image">'
                  '\n<meta name="twitter:title" content="Pizza Napoli Carpentras | Pizzeria Livraison a Domicile">'
                  '\n<meta name="twitter:description" content="Pizzeria artisanale depuis 2008. 80+ pizzas. Livraison gratuite 7j/7.">'
                  '\n<meta name="twitter:image" content="https://pizzanapolicarpentras.fr/hero1.jpg">'
              )
              content = content.replace('</title>', '</title>' + tw, 1)
              changes.append('Added Twitter Cards')

          # 6. Fix www mismatch in Schema.org
          count = content.count('www.pizzanapolicarpentras.fr')
          if count > 0:
              content = content.replace('www.pizzanapolicarpentras.fr', 'pizzanapolicarpentras.fr')
              changes.append(f'Fixed www mismatch ({count}x)')

          # 7. Fix external links
          for url in [
              'https://www.facebook.com/pizzanapolipizzeria',
              'https://www.google.com/maps/place/Pizza+Napoli+Carpentras',
          ]:
              old = f'href="{url}"'
              new = f'href="{url}" target="_blank" rel="noopener"'
              if old in content and 'target="_blank"' not in content.split(url)[1][:50]:
                  content = content.replace(old, new)
          changes.append('Fixed external links')

          # 8. Add lazy loading to images
          def add_lazy(m):
              t = m.group(0)
              if 'loading=' in t:
                  return t
              return t.replace('<img ', '<img loading="lazy" ')
          content = re.sub(r'<img\s[^>]+>', add_lazy, content)
          content = content.replace('<img loading="lazy"', '<img', 1)
          changes.append('Added lazy loading')

          # 9. Add font-display:swap
          if 'font-display' not in content:
              content = content.replace('@font-face{', '@font-face{font-display:swap;')
              changes.append('Added font-display:swap')

          print(f'Total changes: {len(changes)}')
          for c in changes:
              print(f'  - {c}')

          with open('site/index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          ENDSCRIPT

      - name: Run fix script
        run: python3 /tmp/fix.py

      - name: Commit and push
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          cd site
          git add index.html
          git diff --cached --stat
          git commit -m "Fix critical SEO + accessibility issues (audit 27/03/2026)" || echo "No changes"
          git push origin main
          echo "All fixes deployed!"
