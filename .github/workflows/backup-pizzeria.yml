name: Backup pizzeria site

on:
  # Backup automatique chaque dimanche à 3h du matin (heure Paris)
  schedule:
    - cron: '0 1 * * 0'

  # Backup manuel à tout moment
  workflow_dispatch:
    inputs:
      reason:
        description: 'Raison du backup (optionnel)'
        required: false
        default: 'Backup manuel'

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get current date
        id: date
        run: echo "date=$(TZ='Europe/Paris' date '+%Y-%m-%d_%Hh%M')" >> $GITHUB_OUTPUT

      - name: Clone production site
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          COMMIT=$(git rev-parse --short HEAD)
          echo "COMMIT_SHA=$COMMIT" >> $GITHUB_ENV
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV
          echo "Cloned at commit: $COMMIT - $COMMIT_MSG"

      - name: Create backup tag in production repo
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="backup/${{ steps.date.outputs.date }}"
          git tag -a "$TAG_NAME" -m "Backup: ${{ steps.date.outputs.date }} | ${{ github.event.inputs.reason || 'Auto backup hebdomadaire' }}"
          git push origin "$TAG_NAME" || echo "Tag push failed (may already exist)"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Create backup archive
        run: |
          cd site
          BACKUP_NAME="pizzeria-backup-${{ steps.date.outputs.date }}-${COMMIT_SHA}"
          tar -czf /tmp/${BACKUP_NAME}.tar.gz --exclude='.git' .
          echo "BACKUP_NAME=${BACKUP_NAME}" >> $GITHUB_ENV
          echo "BACKUP_PATH=/tmp/${BACKUP_NAME}.tar.gz" >> $GITHUB_ENV
          SIZE=$(du -sh /tmp/${BACKUP_NAME}.tar.gz | cut -f1)
          echo "BACKUP_SIZE=$SIZE" >> $GITHUB_ENV
          echo "Archive: ${BACKUP_NAME}.tar.gz ($SIZE)"

      - name: Checkout Dev repo for release
        uses: actions/checkout@v4

      - name: Create GitHub Release with backup
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "backup/pizzeria-${{ steps.date.outputs.date }}"
          name: "Backup Pizzeria - ${{ steps.date.outputs.date }}"
          body: |
            ## Backup du site Pizza Napoli Carpentras

            - **Date** : ${{ steps.date.outputs.date }}
            - **Commit** : ${{ env.COMMIT_SHA }} - ${{ env.COMMIT_MSG }}
            - **Taille** : ${{ env.BACKUP_SIZE }}
            - **Raison** : ${{ github.event.inputs.reason || 'Auto backup hebdomadaire' }}
            - **Tag production** : ${{ env.TAG_NAME }}

            ### Restauration
            Pour restaurer ce backup : Actions > "Restore pizzeria site from backup" > entrer `${{ env.TAG_NAME }}`
          files: ${{ env.BACKUP_PATH }}
          draft: false
          prerelease: false

      - name: Summary
        run: |
          echo "## ✅ Backup terminé" >> $GITHUB_STEP_SUMMARY
          echo "- **Date** : ${{ steps.date.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit** : ${COMMIT_SHA} - ${COMMIT_MSG}" >> $GITHUB_STEP_SUMMARY
          echo "- **Archive** : ${BACKUP_NAME}.tar.gz (${BACKUP_SIZE})" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag production** : ${TAG_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release** : backup/pizzeria-${{ steps.date.outputs.date }}" >> $GITHUB_STEP_SUMMARY
