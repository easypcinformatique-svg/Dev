name: Deploy Construction Calculator to GitHub Pages

on:
  push:
    branches: [main, claude/construction-cost-calculator-inOz5]
    paths:
      - 'construction-cost-calculator/**'
      - '.github/workflows/deploy-calculator.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: construction-cost-calculator/package-lock.json

      - name: Install dependencies
        working-directory: construction-cost-calculator
        run: npm ci

      - name: Build
        working-directory: construction-cost-calculator
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: construction-cost-calculator/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
