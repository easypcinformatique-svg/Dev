name: Audit expert fixes (legal + SEO + accessibility)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/audit-expert-fixes.yml'

jobs:
  apply-all:
    runs-on: ubuntu-latest
    steps:
      - name: Clone production site
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: L1 - Create mentions legales
        run: |
          mkdir -p site/mentions-legales
          cat > site/mentions-legales/index.html << 'EOF'
          <!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
          <title>Mentions Legales | Pizza Napoli Carpentras</title>
          <meta name="robots" content="noindex">
          <link rel="canonical" href="https://pizzanapolicarpentras.fr/mentions-legales/">
          <link rel="icon" type="image/svg+xml" href="/favicon.svg">
          <style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',Arial,sans-serif;color:#3a3530;background:#FFFDF7;line-height:1.8;padding:2rem;max-width:800px;margin:0 auto;}h1{font-size:1.8rem;color:#c0392b;margin-bottom:1.5rem;}h2{font-size:1.2rem;color:#c0392b;margin:2rem 0 .5rem;border-bottom:2px solid #f5e6d0;padding-bottom:.3rem;}p{margin-bottom:1rem;font-size:.95rem;}a{color:#c0392b;}.back{display:inline-block;margin-bottom:1.5rem;font-size:.9rem;}</style>
          </head><body>
          <a href="/" class="back">&larr; Retour au site</a>
          <h1>Mentions Legales</h1>
          <h2>Editeur du site</h2>
          <p><strong>Pizza Napoli Carpentras</strong><br>SARL au capital variable<br>SIRET : 952 676 310 000 16<br>Gerant : Brandon BRES<br>209 Avenue Pierre Semard, 84200 Carpentras, France<br>Telephone : 07 61 08 36 08<br>Email : contact@pizzanapolicarpentras.fr</p>
          <h2>Hebergement</h2>
          <p>Ce site est heberge par <strong>GitHub, Inc.</strong><br>88 Colin P. Kelly Jr. Street, San Francisco, CA 94107, USA<br>Site : github.com</p>
          <h2>Propriete intellectuelle</h2>
          <p>L'ensemble du contenu de ce site (textes, images, logo, nom commercial) est la propriete exclusive de Pizza Napoli Carpentras ou de ses partenaires. Toute reproduction, meme partielle, est interdite sans autorisation prealable ecrite.</p>
          <h2>Responsabilite</h2>
          <p>Pizza Napoli Carpentras s'efforce de fournir des informations exactes et a jour. Toutefois, la societe ne saurait etre tenue responsable des erreurs, omissions ou resultats obtenus suite a l'utilisation de ces informations. Les prix et disponibilites sont donnes a titre indicatif et peuvent etre modifies sans preavis.</p>
          <h2>Donnees personnelles</h2>
          <p>Conformement au RGPD, vous disposez d'un droit d'acces, de rectification et de suppression de vos donnees personnelles. Pour exercer ces droits, contactez-nous a contact@pizzanapolicarpentras.fr. Pour plus d'informations, consultez notre <a href="/politique-de-confidentialite/">politique de confidentialite</a>.</p>
          <h2>Cookies</h2>
          <p>Ce site utilise Google Analytics pour mesurer l'audience. Vous pouvez desactiver les cookies dans les parametres de votre navigateur.</p>
          <p style="margin-top:2rem;font-size:.8rem;color:#999;">Derniere mise a jour : 27 mars 2026</p>
          </body></html>
          EOF
          echo "Created mentions-legales"

      - name: L2 - Create politique de confidentialite
        run: |
          mkdir -p site/politique-de-confidentialite
          cat > site/politique-de-confidentialite/index.html << 'EOF'
          <!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
          <title>Politique de Confidentialite | Pizza Napoli Carpentras</title>
          <meta name="robots" content="noindex">
          <link rel="canonical" href="https://pizzanapolicarpentras.fr/politique-de-confidentialite/">
          <link rel="icon" type="image/svg+xml" href="/favicon.svg">
          <style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',Arial,sans-serif;color:#3a3530;background:#FFFDF7;line-height:1.8;padding:2rem;max-width:800px;margin:0 auto;}h1{font-size:1.8rem;color:#c0392b;margin-bottom:1.5rem;}h2{font-size:1.2rem;color:#c0392b;margin:2rem 0 .5rem;border-bottom:2px solid #f5e6d0;padding-bottom:.3rem;}p,li{margin-bottom:.8rem;font-size:.95rem;}ul{padding-left:1.5rem;}a{color:#c0392b;}.back{display:inline-block;margin-bottom:1.5rem;font-size:.9rem;}</style>
          </head><body>
          <a href="/" class="back">&larr; Retour au site</a>
          <h1>Politique de Confidentialite</h1>
          <h2>Responsable du traitement</h2>
          <p><strong>Pizza Napoli Carpentras</strong> - SARL<br>SIRET : 952 676 310 000 16<br>Gerant : Brandon BRES<br>209 Avenue Pierre Semard, 84200 Carpentras<br>contact@pizzanapolicarpentras.fr</p>
          <h2>Donnees collectees</h2>
          <p>Lors d'une commande, nous collectons :</p>
          <ul><li>Nom et prenom</li><li>Numero de telephone</li><li>Adresse de livraison</li><li>Eventuellement votre adresse email</li></ul>
          <h2>Finalite du traitement</h2>
          <p>Vos donnees sont utilisees exclusivement pour :</p>
          <ul><li>Traiter et livrer votre commande</li><li>Vous contacter en cas de probleme avec votre commande</li><li>Ameliorer nos services</li></ul>
          <h2>Duree de conservation</h2>
          <p>Vos donnees sont conservees pendant une duree maximale de 3 ans a compter de la derniere commande, conformement aux obligations legales.</p>
          <h2>Partage des donnees</h2>
          <p>Vos donnees ne sont jamais vendues ni transmises a des tiers, sauf obligation legale. Nous utilisons Google Analytics pour mesurer l'audience du site (donnees anonymisees).</p>
          <h2>Vos droits</h2>
          <p>Conformement au RGPD, vous disposez des droits suivants :</p>
          <ul><li>Droit d'acces a vos donnees</li><li>Droit de rectification</li><li>Droit de suppression</li><li>Droit d'opposition au traitement</li><li>Droit a la portabilite</li></ul>
          <p>Pour exercer ces droits : <strong>contact@pizzanapolicarpentras.fr</strong></p>
          <h2>Cookies</h2>
          <p>Ce site utilise Google Analytics (cookie _ga) pour analyser le trafic. Vous pouvez desactiver les cookies via les parametres de votre navigateur.</p>
          <h2>Reclamation</h2>
          <p>En cas de litige, vous pouvez saisir la CNIL : <a href="https://www.cnil.fr" target="_blank" rel="noopener">www.cnil.fr</a></p>
          <p style="margin-top:2rem;font-size:.8rem;color:#999;">Derniere mise a jour : 27 mars 2026</p>
          </body></html>
          EOF
          echo "Created politique-de-confidentialite"

      - name: L3 - Create CGV
        run: |
          mkdir -p site/cgv
          cat > site/cgv/index.html << 'EOF'
          <!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
          <title>Conditions Generales de Vente | Pizza Napoli Carpentras</title>
          <meta name="robots" content="noindex">
          <link rel="canonical" href="https://pizzanapolicarpentras.fr/cgv/">
          <link rel="icon" type="image/svg+xml" href="/favicon.svg">
          <style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Segoe UI',Arial,sans-serif;color:#3a3530;background:#FFFDF7;line-height:1.8;padding:2rem;max-width:800px;margin:0 auto;}h1{font-size:1.8rem;color:#c0392b;margin-bottom:1.5rem;}h2{font-size:1.2rem;color:#c0392b;margin:2rem 0 .5rem;border-bottom:2px solid #f5e6d0;padding-bottom:.3rem;}p,li{margin-bottom:.8rem;font-size:.95rem;}ul{padding-left:1.5rem;}a{color:#c0392b;}.back{display:inline-block;margin-bottom:1.5rem;font-size:.9rem;}</style>
          </head><body>
          <a href="/" class="back">&larr; Retour au site</a>
          <h1>Conditions Generales de Vente</h1>
          <h2>1. Identite du vendeur</h2>
          <p><strong>Pizza Napoli Carpentras</strong> - SARL<br>SIRET : 952 676 310 000 16<br>Gerant : Brandon BRES<br>209 Avenue Pierre Semard, 84200 Carpentras<br>Tel : 07 61 08 36 08</p>
          <h2>2. Produits et prix</h2>
          <p>Les prix sont indiques en euros TTC. Ils peuvent etre modifies a tout moment. Les prix applicables sont ceux en vigueur au moment de la commande.</p>
          <h2>3. Commande</h2>
          <p>Les commandes peuvent etre passees par telephone (07 61 08 36 08) ou via le formulaire en ligne du site. Toute commande vaut acceptation des presentes CGV.</p>
          <h2>4. Livraison</h2>
          <p>La livraison est gratuite dans la zone desservie (Carpentras et communes environnantes). Le delai moyen de livraison est de 30 a 45 minutes. Pizza Napoli ne pourra etre tenu responsable des retards dus a des circonstances exceptionnelles (intemperies, forte affluence).</p>
          <h2>5. Paiement</h2>
          <p>Le paiement s'effectue a la livraison ou a l'emporter. Moyens acceptes : especes, carte bancaire, tickets restaurant.</p>
          <h2>6. Reclamation</h2>
          <p>Pour toute reclamation, contactez-nous au 07 61 08 36 08 ou par email a contact@pizzanapolicarpentras.fr. Nous nous engageons a traiter votre demande dans les 48 heures.</p>
          <h2>7. Allergenes</h2>
          <p>La liste des allergenes est disponible sur demande au 07 61 08 36 08. Nos pizzas peuvent contenir : gluten, lait, oeufs, poisson, crustaces, mollusques, fruits a coque, celeri, moutarde, sesame, soja, lupin.</p>
          <h2>8. Droit applicable</h2>
          <p>Les presentes CGV sont soumises au droit francais. En cas de litige, le tribunal competent sera celui de Carpentras.</p>
          <h2>9. Mediateur</h2>
          <p>Conformement aux articles L.616-1 et R.616-1 du Code de la consommation, en cas de litige non resolu, le consommateur peut recourir gratuitement au service de mediation MEDICYS : <a href="https://www.medicys.fr" target="_blank" rel="noopener">www.medicys.fr</a></p>
          <p style="margin-top:2rem;font-size:.8rem;color:#999;">Derniere mise a jour : 27 mars 2026</p>
          </body></html>
          EOF
          echo "Created CGV"

      - name: Apply HTML fixes to index and subpages
        run: |
          cd site

          python3 -c "
          import re, os, glob

          # Fix index.html
          with open('index.html','r',encoding='utf-8') as f: c=f.read()
          changes=[]

          # S3+S5: Fix www and date 2010->2008
          n=c.count('www.pizzanapolicarpentras.fr')
          if n>0:
              c=c.replace('www.pizzanapolicarpentras.fr','pizzanapolicarpentras.fr')
              changes.append(f'Fixed www ({n}x)')
          n2=c.count('2010')
          if n2>0:
              c=c.replace('depuis 2010','depuis 2008').replace('since 2010','since 2008')
              changes.append('Fixed 2010->2008')

          # S6: Fix reviewCount 284->306
          c=c.replace('\"reviewCount\":\"284\"','\"reviewCount\":\"306\"')
          c=c.replace('\"reviewCount\": \"284\"','\"reviewCount\": \"306\"')
          c=c.replace('284 avis','306 avis')
          c=c.replace('data-target=\"284\"','data-target=\"306\"')
          changes.append('Updated reviewCount to 306')

          # CT1: Fix Margharita
          c=c.replace('Margharita','Margherita')
          changes.append('Fixed Margharita->Margherita')

          # L1-L3: Add legal links to footer
          if 'mentions-legales' not in c:
              c=c.replace('</footer>','<div style=\"text-align:center;padding:1rem 0;font-size:.7rem;color:#666;border-top:1px solid rgba(255,255,255,.1);\"><a href=\"/mentions-legales/\" style=\"color:#999;text-decoration:none;\">Mentions legales</a> · <a href=\"/politique-de-confidentialite/\" style=\"color:#999;text-decoration:none;\">Confidentialite</a> · <a href=\"/cgv/\" style=\"color:#999;text-decoration:none;\">CGV</a></div></footer>')
              changes.append('Added legal links to footer')

          # S7: Fix Margherita price inconsistency (6.00->7.90 in schema/top8)
          c=c.replace(\"'Margherita','Tomate, fromage',6.00\",\"'Margherita','Tomate, fromage',7.90\")
          c=c.replace('\"price\":\"6.00\"','\"price\":\"7.90\"')
          changes.append('Fixed Margherita price to 7.90')

          # L4: Add allergenes notice near menu
          if 'allergenes' not in c.lower() and 'allergene' not in c.lower():
              c=c.replace('</section> <section class=\"testimonials\"','<div style=\"text-align:center;padding:1rem;font-size:.75rem;color:#888;background:rgba(0,0,0,.03);margin-top:1rem;\">Allergenes : nos pizzas peuvent contenir gluten, lait, oeufs, poisson, crustaces, fruits a coque, celeri, moutarde, sesame. Liste detaillee sur demande au 07 61 08 36 08.</div></section> <section class=\"testimonials\"')
              changes.append('Added allergenes notice')

          with open('index.html','w',encoding='utf-8') as f: f.write(c)
          print(f'index.html: {len(changes)} changes')
          for ch in changes: print(f'  - {ch}')

          # Fix all livraison pages: www, date, reviewCount, add canonical+meta desc+OG+geo
          for html_path in glob.glob('livraison-pizza-*/index.html'):
              with open(html_path,'r',encoding='utf-8') as f: c=f.read()
              changed=False

              # Fix www
              if 'www.pizzanapolicarpentras.fr' in c:
                  c=c.replace('www.pizzanapolicarpentras.fr','pizzanapolicarpentras.fr')
                  changed=True

              # Fix date
              c=c.replace('depuis 2010','depuis 2008')

              # Fix reviewCount
              c=c.replace('\"reviewCount\":\"200\"','\"reviewCount\":\"306\"')
              c=c.replace('\"reviewCount\":\"272\"','\"reviewCount\":\"306\"')
              c=c.replace('\"reviewCount\":\"284\"','\"reviewCount\":\"306\"')

              # Add legal footer links if missing
              if 'mentions-legales' not in c:
                  c=c.replace('</body>','<div style=\"text-align:center;padding:1rem;font-size:.7rem;color:#666;\"><a href=\"/mentions-legales/\" style=\"color:#999;text-decoration:none;\">Mentions legales</a> · <a href=\"/politique-de-confidentialite/\" style=\"color:#999;text-decoration:none;\">Confidentialite</a> · <a href=\"/cgv/\" style=\"color:#999;text-decoration:none;\">CGV</a></div></body>')
                  changed=True

              if changed:
                  with open(html_path,'w',encoding='utf-8') as f: f.write(c)
                  print(f'Fixed: {html_path}')

          # Fix pizzeria-carpentras and pizza-carpentras pages
          for subdir in ['pizzeria-carpentras','pizza-carpentras']:
              path=f'{subdir}/index.html'
              if os.path.exists(path):
                  with open(path,'r',encoding='utf-8') as f: c=f.read()
                  c=c.replace('www.pizzanapolicarpentras.fr','pizzanapolicarpentras.fr')
                  c=c.replace('depuis 2010','depuis 2008')
                  c=c.replace('\"reviewCount\":\"272\"','\"reviewCount\":\"306\"')
                  c=c.replace('\"reviewCount\":\"284\"','\"reviewCount\":\"306\"')
                  c=c.replace('Margharita','Margherita')
                  if 'mentions-legales' not in c:
                      c=c.replace('</body>','<div style=\"text-align:center;padding:1rem;font-size:.7rem;color:#666;\"><a href=\"/mentions-legales/\" style=\"color:#999;text-decoration:none;\">Mentions legales</a> · <a href=\"/politique-de-confidentialite/\" style=\"color:#999;text-decoration:none;\">Confidentialite</a> · <a href=\"/cgv/\" style=\"color:#999;text-decoration:none;\">CGV</a></div></body>')
                  with open(path,'w',encoding='utf-8') as f: f.write(c)
                  print(f'Fixed: {path}')

          # Fix nos-engagements accents
          path='nos-engagements/index.html'
          if os.path.exists(path):
              with open(path,'r',encoding='utf-8') as f: c=f.read()
              c=c.replace('Qualite','Qualité').replace('d une','d\\'une').replace('l ecoute','l\\'écoute').replace('n est','n\\'est').replace('c est','c\\'est')
              if 'mentions-legales' not in c:
                  c=c.replace('</body>','<div style=\"text-align:center;padding:1rem;font-size:.7rem;color:#666;\"><a href=\"/mentions-legales/\" style=\"color:#999;text-decoration:none;\">Mentions legales</a> · <a href=\"/politique-de-confidentialite/\" style=\"color:#999;text-decoration:none;\">Confidentialite</a> · <a href=\"/cgv/\" style=\"color:#999;text-decoration:none;\">CGV</a></div></body>')
              with open(path,'w',encoding='utf-8') as f: f.write(c)
              print('Fixed: nos-engagements accents + legal links')
          "

      - name: Commit and push
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          cd site
          git add -A
          git diff --cached --stat
          git commit -m "Audit expert: mentions legales, confidentialite, CGV, allergenes, fix www/date/reviewCount/prix/Margherita" || echo "No changes"
          git push origin main
          echo "All deployed!"
