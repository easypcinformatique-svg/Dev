name: SEO batch fixes

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/seo-batch-fixes.yml'

jobs:
  apply-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Clone production site
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create fix scripts
        run: |
          # Image sitemap
          cat > /tmp/sitemap-images.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9" xmlns:image="http://www.google.com/schemas/sitemap-image/1.1">
          <url><loc>https://pizzanapolicarpentras.fr/</loc>
          <image:image><image:loc>https://pizzanapolicarpentras.fr/hero1.webp</image:loc><image:title>Pizza Napoli Carpentras</image:title></image:image>
          <image:image><image:loc>https://pizzanapolicarpentras.fr/hero2.webp</image:loc><image:title>Pizza artisanale Carpentras</image:title></image:image>
          <image:image><image:loc>https://pizzanapolicarpentras.fr/hero3.webp</image:loc><image:title>Pizzeria livraison Carpentras</image:title></image:image>
          <image:image><image:loc>https://pizzanapolicarpentras.fr/hero4.webp</image:loc><image:title>Livraison pizza domicile</image:title></image:image>
          <image:image><image:loc>https://pizzanapolicarpentras.fr/hero5.webp</image:loc><image:title>Pizza Napoli Vaucluse</image:title></image:image>
          <image:image><image:loc>https://pizzanapolicarpentras.fr/Tartufo.webp</image:loc><image:title>Pizza Tartufo truffe</image:title></image:image>
          <image:image><image:loc>https://pizzanapolicarpentras.fr/saint-jacques-.webp</image:loc><image:title>Pizza Saint-Jacques</image:title></image:image>
          </url></urlset>
          EOF
          cp /tmp/sitemap-images.xml site/sitemap-images.xml
          echo "Created sitemap-images.xml"

          # RSS feed
          cat > /tmp/feed.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0"><channel>
          <title>Pizza Napoli Carpentras - Blog</title>
          <link>https://pizzanapolicarpentras.fr/blog/</link>
          <description>Guides et actualites Pizza Napoli Carpentras</description>
          <language>fr</language>
          <item><title>Meilleures pizzas Carpentras</title><link>https://pizzanapolicarpentras.fr/blog/meilleures-pizzas-carpentras/</link></item>
          <item><title>Pizza artisanale Carpentras</title><link>https://pizzanapolicarpentras.fr/blog/pizza-artisanale-carpentras/</link></item>
          <item><title>Pate pizza maison</title><link>https://pizzanapolicarpentras.fr/blog/pate-pizza-maison-carpentras/</link></item>
          <item><title>FAQ Livraison pizza</title><link>https://pizzanapolicarpentras.fr/blog/faq-livraison-pizza-carpentras/</link></item>
          <item><title>Guide livraison pizza</title><link>https://pizzanapolicarpentras.fr/blog/guide-livraison-pizza-carpentras/</link></item>
          <item><title>Commander pizza groupe</title><link>https://pizzanapolicarpentras.fr/blog/commander-pizza-groupe-carpentras/</link></item>
          <item><title>Que faire a Carpentras ce soir</title><link>https://pizzanapolicarpentras.fr/blog/que-faire-carpentras-ce-soir/</link></item>
          <item><title>Que faire a Monteux ce soir</title><link>https://pizzanapolicarpentras.fr/blog/que-faire-monteux-ce-soir/</link></item>
          <item><title>Que faire a Pernes ce soir</title><link>https://pizzanapolicarpentras.fr/blog/que-faire-pernes-les-fontaines-ce-soir/</link></item>
          <item><title>Que faire a Mazan ce soir</title><link>https://pizzanapolicarpentras.fr/blog/que-faire-mazan-ce-soir/</link></item>
          </channel></rss>
          EOF
          cp /tmp/feed.xml site/feed.xml
          echo "Created feed.xml"

      - name: Apply HTML fixes
        run: |
          cd site

          # Add image sitemap to robots.txt
          if ! grep -q "sitemap-images" robots.txt; then
            echo "Sitemap: https://pizzanapolicarpentras.fr/sitemap-images.xml" >> robots.txt
          fi

          # Add RSS link to index.html
          if ! grep -q "feed.xml" index.html; then
            sed -i 's|</head>|<link rel="alternate" type="application/rss+xml" title="Pizza Napoli Blog" href="/feed.xml">\n</head>|' index.html
          fi

          # Add noindex headers to netlify.toml
          if [ -f "netlify.toml" ] && ! grep -q "X-Robots-Tag" netlify.toml; then
            printf '\n[[headers]]\n  for = "/*.py"\n  [headers.values]\n    X-Robots-Tag = "noindex, nofollow"\n\n[[headers]]\n  for = "/*.pyw"\n  [headers.values]\n    X-Robots-Tag = "noindex, nofollow"\n\n[[headers]]\n  for = "/*.bat"\n  [headers.values]\n    X-Robots-Tag = "noindex, nofollow"\n' >> netlify.toml
          fi

          # Add FAQ schema to delivery pages
          for dir in livraison-pizza-carpentras livraison-pizza-monteux livraison-pizza-pernes-les-fontaines livraison-pizza-mazan livraison-pizza-aubignan livraison-pizza-caromb livraison-pizza-loriol-du-comtat livraison-pizza-saint-didier livraison-pizza-serres livraison-pizza-84200; do
            if [ -f "$dir/index.html" ] && ! grep -q "FAQPage" "$dir/index.html"; then
              CITY=$(echo "$dir" | sed 's/livraison-pizza-//;s/-/ /g;s/\b./\u&/g')
              FAQ="{\"@context\":\"https://schema.org\",\"@type\":\"FAQPage\",\"mainEntity\":[{\"@type\":\"Question\",\"name\":\"Pizza Napoli livre a $CITY ?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"Oui, livraison gratuite a $CITY 7j/7 de 19h a 22h. Tel 07 61 08 36 08.\"}},{\"@type\":\"Question\",\"name\":\"Delai de livraison a $CITY ?\",\"acceptedAnswer\":{\"@type\":\"Answer\",\"text\":\"30 a 45 minutes. Commandez des 17h30.\"}}]}"
              sed -i "s|</head>|<script type=\"application/ld+json\">$FAQ</script>\n</head>|" "$dir/index.html"
              echo "Added FAQ to $dir"
            fi
          done

      - name: Minify HTML
        run: |
          cd site
          python3 -c "
          import re
          with open('index.html','r',encoding='utf-8') as f: c=f.read()
          s1=len(c)
          c=re.sub(r'<!--(?!\[).*?-->','',c,flags=re.DOTALL)
          c=re.sub(r'>\s{2,}<','> <',c)
          c='\n'.join(l.strip() for l in c.split('\n') if l.strip())
          s2=len(c)
          with open('index.html','w',encoding='utf-8') as f: f.write(c)
          print(f'Minified: {s1} -> {s2} (-{s1-s2} bytes, -{round((s1-s2)*100/s1)}%)')
          "

      - name: Commit and push
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          cd site
          git add -A
          git diff --cached --stat
          git commit -m "SEO: image sitemap, FAQ schema, RSS feed, minify, noindex" || echo "No changes"
          git push origin main
          echo "Done!"
