name: Mise à jour et audit automatique des maires

on:
  schedule:
    # Tous les lundis à 6h du matin (UTC)
    - cron: '0 6 * * 1'
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  update-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: "Étape 1 : MAJ maires depuis le RNE (data.gouv.fr)"
        run: |
          python3 << 'PYEOF'
          import csv, io, json, re, urllib.request, unicodedata
          from datetime import datetime

          def title_case(s):
              small = {"de","du","des","le","la","les","l","d","en","sur","sous","et"}
              parts = re.split(r"([-\s'])", s.lower())
              return "".join(w.capitalize() if (i==0 or w not in small) else w for i,w in enumerate(parts))

          def norm(s):
              s = unicodedata.normalize("NFD", s)
              s = re.sub(r"[\u0300-\u036f]", "", s)
              return s.upper().strip()

          # 1. Télécharger le RNE
          print("📡 Récupération du RNE depuis data.gouv.fr…")
          req = urllib.request.Request(
              "https://www.data.gouv.fr/api/1/datasets/repertoire-national-des-elus-1/",
              headers={"User-Agent": "annuaire-maires-bot/1.0"}
          )
          with urllib.request.urlopen(req) as resp:
              dataset = json.load(resp)

          csv_url = None
          for r in dataset["resources"]:
              if "maire" in r.get("title", "").lower() and r.get("format") == "csv":
                  csv_url = r["url"]
                  csv_date = r.get("last_modified", "")[:10]
                  break

          if not csv_url:
              print("❌ Fichier CSV des maires introuvable")
              exit(0)

          print(f"📅 RNE dernière MAJ : {csv_date}")

          req2 = urllib.request.Request(csv_url, headers={"User-Agent": "annuaire-maires-bot/1.0"})
          with urllib.request.urlopen(req2) as resp2:
              csv_text = resp2.read().decode("utf-8", errors="replace")

          # 2. Parser le RNE
          reader = csv.DictReader(io.StringIO(csv_text), delimiter=";")
          maire_map = {}
          has_2026 = False
          for row in reader:
              commune = row.get("Libellé de la commune", "").strip()
              nom = row.get("Nom de l'élu", "").strip()
              prenom = row.get("Prénom de l'élu", "").strip()
              dept = row.get("Code du département", "").strip()
              date_mandat = row.get("Date de début du mandat", "").strip()
              if not commune or not nom: continue
              name = f"{title_case(prenom)} {title_case(nom)}" if prenom else title_case(nom)
              key = norm(commune)
              year = 0
              if date_mandat:
                  parts = date_mandat.split("/")
                  if len(parts) == 3: year = int(parts[2])
              if year >= 2026: has_2026 = True
              maire_map[key] = name
              if dept: maire_map[f"{key}_{dept}"] = name

          print(f"📋 {len(maire_map)} maires dans le RNE")
          print(f"{'✅' if has_2026 else '⚠'} Mandats 2026 : {'OUI' if has_2026 else 'NON — protection activée'}")

          # 3. Lire et mettre à jour le HTML
          with open("annuaire-maires-france.html", "r", encoding="utf-8") as f:
              html = f.read()

          data_match = re.search(r"let DATA = (\[[\s\S]*?\]);", html)
          if not data_match:
              print("❌ DATA introuvable"); exit(0)

          data_str = data_match.group(1)
          json_str = re.sub(r'(\{|,)\s*(\w+)\s*:', r'\1"\2":', data_str)
          try:
              data = json.loads(json_str)
          except:
              print("❌ Erreur parsing DATA"); exit(0)

          updated = 0
          for commune in data:
              ville = commune.get("ville", "")
              base = re.sub(r"\s*\(.*\)$", "", ville)
              dept = commune.get("dept", "")
              keys = [f"{norm(base)}_{dept}", norm(base)]
              for key in keys:
                  if key in maire_map:
                      new = maire_map[key]
                      if not has_2026 and commune.get("maire"):
                          break  # Protection
                      if new and new != commune.get("maire"):
                          print(f"  ✏ {ville}: {commune.get('maire','')} → {new}")
                          commune["maire"] = new
                          updated += 1
                      break

          print(f"\n✅ RNE: {updated} maire(s) mis à jour")

          if updated > 0:
              lines = []
              for c in data:
                  parts = []
                  for k in ["ville","pop","dept","region","maire","adresse","tel","email"]:
                      v = c.get(k, "")
                      if k == "pop": parts.append(f'{k}:{v}')
                      else:
                          escaped = str(v).replace("\\", "\\\\").replace("'", "\\'")
                          parts.append(f'{k}:"{escaped}"')
                  lines.append("  {" + ",".join(parts) + "}")
              new_data = "let DATA = [\n" + ",\n".join(lines) + "\n];"
              html = re.sub(r"let DATA = \[[\s\S]*?\];", new_data, html)
              now = datetime.now()
              ver = f"v.{now.year}.{now.month:02d}.{now.day:02d}-{now.hour:02d}h{now.minute:02d}"
              html = re.sub(r'v\.\d{4}\.\d{2}\.\d{2}-\d{2}h\d{2}', ver, html)
              with open("annuaire-maires-france.html", "w", encoding="utf-8") as f:
                  f.write(html)
              print(f"📝 Fichier mis à jour — {ver}")

          PYEOF

      - name: "Étape 2 : Audit via résultats officiels (Ministère de l'Intérieur)"
        run: |
          python3 << 'PYEOF'
          import csv, io, json, re, urllib.request, unicodedata

          def norm(s):
              s = unicodedata.normalize("NFD", s)
              s = re.sub(r"[\u0300-\u036f]", "", s)
              return s.upper().strip()

          def title_case(s):
              small = {"de","du","des","le","la","les","l","d","en","sur","sous","et"}
              parts = re.split(r"([-\s'])", s.lower())
              return "".join(w.capitalize() if (i==0 or w not in small) else w for i,w in enumerate(parts))

          # 1. Télécharger les résultats T2 par commune (source officielle)
          print("📡 Téléchargement résultats officiels Tour 2…")
          try:
              req = urllib.request.Request(
                  "https://www.data.gouv.fr/api/1/datasets/elections-municipales-2026-resultats-du-second-tour/",
                  headers={"User-Agent": "annuaire-maires-bot/1.0"}
              )
              with urllib.request.urlopen(req) as resp:
                  ds = json.load(resp)
              csv_url = None
              for r in ds["resources"]:
                  t = r.get("title","").lower()
                  if "communes" in t and "municipales 2026" in t and "bv" not in t and "polynésie" not in t and "arrondissement" not in t:
                      csv_url = r["url"]; break
              if not csv_url:
                  print("⚠ CSV résultats T2 introuvable — audit ignoré"); exit(0)
          except Exception as e:
              print(f"⚠ Erreur accès data.gouv.fr: {e} — audit ignoré"); exit(0)

          req2 = urllib.request.Request(csv_url, headers={"User-Agent": "annuaire-maires-bot/1.0"})
          with urllib.request.urlopen(req2) as resp2:
              t2_text = resp2.read().decode("utf-8-sig", errors="replace")

          # 2. Parser T2 : trouver le gagnant (plus de voix) par commune
          t2_winners = {}
          reader = csv.reader(io.StringIO(t2_text), delimiter=";")
          headers = [h.strip().strip('"') for h in next(reader)]
          for row in reader:
              row = [c.strip().strip('"') for c in row]
              if len(row) < 26: continue
              dept, commune = row[0], row[3]
              best_nom, best_pre, best_voix = "", "", -1
              i = 18
              while i + 7 < len(row):
                  nom = row[i+1] if i+1 < len(row) else ""
                  pre = row[i+2] if i+2 < len(row) else ""
                  vs = row[i+7].replace(" ","").replace("%","") if i+7 < len(row) else "0"
                  if not nom and not (row[i+5] if i+5 < len(row) else ""): break
                  try: v = int(vs)
                  except: v = 0
                  if v > best_voix: best_voix, best_nom, best_pre = v, nom, pre
                  i += 13
              if best_voix > 0 and best_nom:
                  full = f"{title_case(best_pre)} {title_case(best_nom)}" if best_pre else title_case(best_nom)
                  key = norm(commune)
                  t2_winners[key] = full
                  t2_winners[f"{key}_{dept}"] = full

          print(f"📊 {len(t2_winners)} gagnants T2 trouvés")

          # 3. Lire le HTML et vérifier
          with open("annuaire-maires-france.html", "r", encoding="utf-8") as f:
              html = f.read()
          pairs = re.findall(r'ville:"([^"]+)".*?dept:"([^"]+)".*?maire:"([^"]*)"', html)

          errors = []
          confirmed = 0
          for ville, dept, current in pairs:
              base = re.sub(r"\s*\(.*\)$", "", ville)
              keys = [f"{norm(base)}_{dept}", norm(base), norm(ville)]
              for key in keys:
                  if key in t2_winners:
                      official = t2_winners[key]
                      if norm(official) != norm(current):
                          errors.append({"ville":ville,"dept":dept,"current":current,"official":official})
                      else:
                          confirmed += 1
                      break

          print(f"\n{'✅' if not errors else '❌'} Audit T2: {confirmed} confirmés, {len(errors)} erreurs")
          for e in errors:
              print(f"  ⚠ {e['ville']}: \"{e['current']}\" ≠ \"{e['official']}\" (officiel)")

          # 4. Si erreurs, corriger automatiquement
          if errors:
              data_match = re.search(r"let DATA = (\[[\s\S]*?\]);", html)
              json_str = re.sub(r'(\{|,)\s*(\w+)\s*:', r'\1"\2":', data_match.group(1))
              data = json.loads(json_str)
              fixed = 0
              for e in errors:
                  for c in data:
                      if c["ville"] == e["ville"] and c["dept"] == e["dept"]:
                          c["maire"] = e["official"]
                          fixed += 1
                          break
              if fixed:
                  lines = []
                  for c in data:
                      parts = []
                      for k in ["ville","pop","dept","region","maire","adresse","tel","email"]:
                          v = c.get(k, "")
                          if k == "pop": parts.append(f'{k}:{v}')
                          else:
                              escaped = str(v).replace("\\","\\\\").replace("'","\\'")
                              parts.append(f'{k}:"{escaped}"')
                      lines.append("  {" + ",".join(parts) + "}")
                  new_data = "let DATA = [\n" + ",\n".join(lines) + "\n];"
                  html = re.sub(r"let DATA = \[[\s\S]*?\];", new_data, html)
                  with open("annuaire-maires-france.html", "w", encoding="utf-8") as f:
                      f.write(html)
                  print(f"🔧 {fixed} maires corrigés automatiquement depuis les résultats officiels")

          PYEOF

      - name: Vérifier s'il y a des changements
        id: check
        run: |
          if git diff --quiet annuaire-maires-france.html 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ Aucun changement — tout est à jour"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📝 Changements détectés"
          fi

      - name: Commit et push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add annuaire-maires-france.html
          git commit -m "🔄 MAJ auto + audit maires — $(date +'%d/%m/%Y %H:%M')

          Sources:
          - RNE (data.gouv.fr) pour les noms des maires
          - Résultats officiels Ministère de l'Intérieur pour l'audit"
          git push
