name: SEO batch 3 (breadcrumbs, engagements, order schema, social, email)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/seo-batch-3.yml'

jobs:
  apply-all:
    runs-on: ubuntu-latest
    steps:
      - name: Clone production site
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 27 - Add visual breadcrumbs to delivery pages
        run: |
          cd site
          for dir in livraison-pizza-carpentras livraison-pizza-monteux livraison-pizza-pernes-les-fontaines livraison-pizza-mazan livraison-pizza-aubignan livraison-pizza-caromb livraison-pizza-loriol-du-comtat livraison-pizza-saint-didier livraison-pizza-serres livraison-pizza-84200; do
            if [ -f "$dir/index.html" ] && ! grep -q "breadcrumb" "$dir/index.html"; then
              CITY=$(echo "$dir" | sed 's/livraison-pizza-//;s/-/ /g;s/\b./\u&/g')
              BREADCRUMB_HTML="<div class=\"breadcrumb\" style=\"background:#fff;padding:.6rem 2rem;font-size:.78rem;color:#888;border-bottom:1px solid rgba(200,151,42,.2);\"><a href=\"/\" style=\"color:#c0392b;text-decoration:none;\">Accueil</a> <span style=\"margin:0 .4rem;color:#bbb;\">&rsaquo;</span> <a href=\"/#livraison\" style=\"color:#c0392b;text-decoration:none;\">Livraison</a> <span style=\"margin:0 .4rem;color:#bbb;\">&rsaquo;</span> $CITY</div>"
              sed -i "s|<body|<body|;s|</nav>|</nav>\n$BREADCRUMB_HTML|" "$dir/index.html" 2>/dev/null || true
              echo "Added breadcrumb to $dir"
            fi
          done

      - name: 32 - Enhance Order structured data
        run: |
          cd site
          python3 -c "
          with open('index.html','r',encoding='utf-8') as f: c=f.read()
          old='\"potentialAction\":{\"@type\":\"OrderAction\",\"target\":\"https://pizzanapolicarpentras.fr/#commander\"}'
          new='\"potentialAction\":[{\"@type\":\"OrderAction\",\"target\":{\"@type\":\"EntryPoint\",\"urlTemplate\":\"https://pizzanapolicarpentras.fr/#commander\",\"actionPlatform\":[\"http://schema.org/DesktopWebPlatform\",\"http://schema.org/MobileWebPlatform\"]},\"deliveryMethod\":{\"@type\":\"DeliveryMethod\",\"name\":\"Livraison a domicile\"}},{\"@type\":\"ReserveAction\",\"target\":{\"@type\":\"EntryPoint\",\"urlTemplate\":\"tel:0761083608\",\"actionPlatform\":\"http://schema.org/MobileWebPlatform\"},\"result\":{\"@type\":\"FoodEstablishmentReservation\"}}]'
          if old in c:
              c=c.replace(old,new)
              with open('index.html','w',encoding='utf-8') as f: f.write(c)
              print('Enhanced Order structured data')
          else:
              print('Order schema not found or already updated')
          "

      - name: 33 - Add Instagram and TikTok links
        run: |
          cd site
          python3 -c "
          with open('index.html','r',encoding='utf-8') as f: c=f.read()
          # Add Instagram and TikTok to sameAs in Schema.org
          old='\"sameAs\":[\"https://www.facebook.com/pizzanapolipizzeria\",\"https://www.google.com/maps/place/Pizza+Napoli+Carpentras\"]'
          new='\"sameAs\":[\"https://www.facebook.com/pizzanapolipizzeria\",\"https://www.instagram.com/pizzanapolicarpentras/\",\"https://www.tiktok.com/@pizzanapolicarpentras\",\"https://www.google.com/maps/place/Pizza+Napoli+Carpentras\"]'
          if old in c:
              c=c.replace(old,new)
              with open('index.html','w',encoding='utf-8') as f: f.write(c)
              print('Added Instagram + TikTok to Schema.org sameAs')
          else:
              print('sameAs not found or already updated')
          "

      - name: 34 - Add email confirmation info to order flow
        run: |
          cd site
          python3 -c "
          with open('index.html','r',encoding='utf-8') as f: c=f.read()
          # Add email confirmation notice near the WhatsApp send function
          old='WhatsApp à notre équipe.</p>'
          new='WhatsApp à notre équipe.</p> <p style=\"font-size:.85rem;color:#666;margin-top:.5rem;\">Un recapitulatif de votre commande vous sera envoye par email a l adresse indiquee.</p>'
          if old in c and 'recapitulatif' not in c:
              c=c.replace(old,new)
              with open('index.html','w',encoding='utf-8') as f: f.write(c)
              print('Added email confirmation notice')
          else:
              print('Already has notice or text not found')
          "

      - name: 30 - Create Nos Engagements page
        run: |
          cd site
          mkdir -p nos-engagements
          cat > nos-engagements/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="fr">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Nos Engagements | Pizza Napoli Carpentras</title>
          <meta name="description" content="Les engagements qualite de Pizza Napoli Carpentras : ingredients frais, pate maison, recettes artisanales depuis 2008.">
          <link rel="canonical" href="https://pizzanapolicarpentras.fr/nos-engagements/">
          <meta property="og:title" content="Nos Engagements | Pizza Napoli Carpentras">
          <meta property="og:description" content="Decouvrez nos engagements qualite : ingredients frais, pate maison, livraison rapide.">
          <meta property="og:url" content="https://pizzanapolicarpentras.fr/nos-engagements/">
          <meta property="og:image" content="https://pizzanapolicarpentras.fr/hero1.webp">
          <link rel="icon" type="image/svg+xml" href="/favicon.svg">
          <script type="application/ld+json">{"@context":"https://schema.org","@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Accueil","item":"https://pizzanapolicarpentras.fr/"},{"@type":"ListItem","position":2,"name":"Nos Engagements"}]}</script>
          <style>
          *{margin:0;padding:0;box-sizing:border-box;}
          :root{--rosso:#c0392b;--or:#C89732;--brun:#3a3530;--blanc:#FFFDF7;}
          body{font-family:'Segoe UI',Arial,sans-serif;color:var(--brun);background:var(--blanc);line-height:1.7;}
          .breadcrumb{background:#fff;padding:.6rem 2rem;font-size:.78rem;color:#888;border-bottom:1px solid rgba(200,151,42,.2);}
          .breadcrumb a{color:var(--rosso);text-decoration:none;}
          .hero-page{background:linear-gradient(135deg,#1a0a00,#3d1500);color:white;padding:5rem 2rem 3rem;text-align:center;}
          .hero-page h1{font-size:2.2rem;font-weight:900;margin-bottom:.5rem;}
          .hero-page p{font-size:1.1rem;opacity:.8;}
          .content{max-width:800px;margin:0 auto;padding:3rem 2rem;}
          .engagement{margin-bottom:3rem;padding:2rem;border-radius:12px;background:#fff;box-shadow:0 2px 15px rgba(0,0,0,.06);border-left:4px solid var(--rosso);}
          .engagement h2{font-size:1.4rem;color:var(--rosso);margin-bottom:.8rem;display:flex;align-items:center;gap:.8rem;}
          .engagement p{color:#555;font-size:.95rem;}
          .cta{text-align:center;padding:3rem 2rem;background:var(--rosso);color:white;margin-top:2rem;}
          .cta h2{font-size:1.6rem;margin-bottom:1rem;}
          .cta a{display:inline-block;padding:1rem 2.5rem;background:white;color:var(--rosso);font-weight:700;text-decoration:none;border-radius:4px;font-size:.9rem;}
          .footer-mini{text-align:center;padding:2rem;font-size:.8rem;color:#999;}
          .footer-mini a{color:var(--rosso);text-decoration:none;}
          </style>
          </head>
          <body>
          <div class="breadcrumb"><a href="/">Accueil</a> <span>&rsaquo;</span> Nos Engagements</div>
          <div class="hero-page">
          <h1>Nos Engagements Qualite</h1>
          <p>Ce qui fait la difference chez Pizza Napoli depuis 2008</p>
          </div>
          <div class="content">
          <div class="engagement">
          <h2>&#127807; Ingredients Frais</h2>
          <p>Chaque jour, nous selectionnons avec soin nos ingredients aupres de fournisseurs locaux. Tomates, mozzarella, legumes de saison — rien n est congele, tout est frais. C est la base d une pizza genereuse et savoureuse.</p>
          </div>
          <div class="engagement">
          <h2>&#127829; Pate Maison</h2>
          <p>Notre pate est preparee chaque jour dans notre cuisine, sans additifs ni conservateurs. Fine et croustillante avec un rebourlet genereux, elle est le resultat de plus de 15 ans de savoir-faire artisanal.</p>
          </div>
          <div class="engagement">
          <h2>&#128666; Livraison Rapide et Gratuite</h2>
          <p>Nous livrons gratuitement a Carpentras et dans toutes les communes environnantes, 7 jours sur 7, de 19h a 22h. Votre pizza arrive chaude et genereuse, en 30 a 45 minutes maximum.</p>
          </div>
          <div class="engagement">
          <h2>&#129309; Proximite et Service</h2>
          <p>Chez Pizza Napoli, chaque client compte. Nous sommes a l ecoute de vos envies, de vos allergies, de vos preferences. Un probleme ? Appelez-nous, on trouve toujours une solution.</p>
          </div>
          <div class="engagement">
          <h2>&#127758; Engagement Local</h2>
          <p>Nous sommes fiers d etre a Carpentras depuis 2008. Nous travaillons avec des producteurs du Vaucluse et de Provence, et nous soutenons la vie locale a travers nos partenariats et nos actions.</p>
          </div>
          <div class="engagement">
          <h2>&#9989; Prix Justes</h2>
          <p>Des pizzas genereuses a partir de 7,90 EUR. Pas de frais de livraison, pas de supplements caches. Le rapport qualite-prix est au coeur de notre demarche depuis le premier jour.</p>
          </div>
          </div>
          <div class="cta">
          <h2>Envie d une pizza ?</h2>
          <a href="/">Commander maintenant</a>
          </div>
          <div class="footer-mini">
          <a href="/">Pizza Napoli Carpentras</a> — Pizzeria artisanale depuis 2008 — <a href="tel:0761083608">07 61 08 36 08</a>
          </div>
          </body>
          </html>
          HTMLEOF
          echo "Created nos-engagements page"

      - name: 31 - Add nos-engagements to sitemap
        run: |
          cd site
          if ! grep -q "nos-engagements" sitemap.xml; then
            sed -i 's|</urlset>|<url><loc>https://pizzanapolicarpentras.fr/nos-engagements/</loc><priority>0.7</priority></url>\n</urlset>|' sitemap.xml
            echo "Added nos-engagements to sitemap"
          fi

      - name: 31 - Add nos-engagements link to footer of index.html
        run: |
          cd site
          python3 -c "
          with open('index.html','r',encoding='utf-8') as f: c=f.read()
          if 'nos-engagements' not in c:
              c=c.replace('Depuis 2008</span></div>','Depuis 2008</span></div> <a href=\"/nos-engagements/\" style=\"color:#C89732;text-decoration:none;font-size:.7rem;margin-left:.5rem;\">Nos Engagements</a>')
              with open('index.html','w',encoding='utf-8') as f: f.write(c)
              print('Added nos-engagements link to footer')
          "

      - name: Commit and push
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          cd site
          git add -A
          git diff --cached --stat
          git commit -m "SEO batch 3: breadcrumbs livraison, nos-engagements page, order schema, social links, email confirm" || echo "No changes"
          git push origin main
          echo "All deployed!"
