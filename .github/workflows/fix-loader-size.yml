name: Fix site text sizes

on:
  workflow_dispatch:

jobs:
  fix-size:
    runs-on: ubuntu-latest
    steps:
      - name: Update loader text size
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git site
          cd site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fix typo: Pizzerie -> Pizzeria
          sed -i 's/Pizzerie/Pizzeria/g' index.html

          # Fix typo: Commandes -> Commander
          sed -i 's/Commandes dès/Commander dès/g' index.html

          echo "Fixed typos"

          python3 << 'PYEOF'
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # Hero buttons: .75rem -> 1rem for all three buttons
          content = content.replace(
              '.btn-primary{background:var(--rouge);color:white;padding:1rem 2.5rem;font-size:.75rem;',
              '.btn-primary{background:var(--rouge);color:white;padding:1.2rem 3rem;font-size:1rem;'
          )
          content = content.replace(
              '.btn-outline{background:transparent;color:white;padding:1rem 2.5rem;font-size:.75rem;',
              '.btn-outline{background:transparent;color:white;padding:1.2rem 3rem;font-size:1rem;'
          )
          content = content.replace(
              '.btn-phone{background:transparent;color:white;padding:1rem 2.5rem;font-size:.75rem;',
              '.btn-phone{background:transparent;color:white;padding:1.2rem 3rem;font-size:1rem;'
          )

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          print('Hero button sizes increased and harmonized')
          PYEOF

          git add index.html
          git commit -m "Increase hero button font size and harmonize padding"
          git push origin main
          echo "Done!"
