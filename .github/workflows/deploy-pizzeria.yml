name: Auto-deploy pizzeria main site

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'pizzeria/**'
      - '!pizzeria/livraison-site/**'
      - '!pizzeria/deploy_*'
      - '!pizzeria/deploy-*'

jobs:
  deploy-main-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Deploy to pizza-napoli repo
        env:
          PAT: ${{ secrets.SATELLITE_DEPLOY_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/carpentraspizzanapoli-design/pizza-napoli.git satellite
          cd satellite

          # Force clean CSS and JS directories first
          rm -rf css/ js/

          # Copy main site files
          cp ../pizzeria/index.html ./
          cp ../pizzeria/favicon.svg ./
          cp ../pizzeria/robots.txt ./
          cp ../pizzeria/sitemap.xml ./
          cp -r ../pizzeria/css/ ./css/
          cp -r ../pizzeria/js/ ./js/

          # Copy blog pages
          mkdir -p blog
          cp ../pizzeria/blog/*.html blog/

          # Copy SEO verification file
          [ -f ../pizzeria/google-site-verification.html ] && cp ../pizzeria/google-site-verification.html ./

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "Auto-deploy: update pizzeria main site"
            git push origin main
            echo "Successfully deployed to pizza-napoli"
          fi
