{% extends "base.html" %}
{% block title %}Importer une facture{% endblock %}

{% block content %}
<h1>Importer une facture</h1>

<form method="post" enctype="multipart/form-data" class="upload-form">
    <div class="form-group">
        <label>Fichier (PDF, JPG, PNG, TIFF)</label>
        <input type="file" name="fichier" accept=".pdf,.jpg,.jpeg,.png,.tiff" required>
    </div>

    <div class="form-group">
        <label>Fournisseur</label>
        <input type="text" name="fournisseur_nom" placeholder="Nom du fournisseur (optionnel)">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Importer</button>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline">Annuler</a>
    </div>
</form>
{% endblock %}
