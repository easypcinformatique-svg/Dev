services:
  - type: web
    name: auction-scanner-13
    runtime: python
    buildCommand: pip install -r auction-scanner-13/requirements.txt
    startCommand: cd auction-scanner-13 && gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
